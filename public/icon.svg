<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Indigo Sparkle Gradient -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Emerald Sparkle Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Rect base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle inner border glow -->
  <rect x="4" y="4" width="504" height="504" rx="124" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="8" />

  <!-- Core Shuffle & Team Graphic -->
  <g transform="translate(48, 48)">
    <!-- Shuffling Loops overlapping -->
    <!-- Loop 1 (Emerald) -->
    <path d="M 80 280 C 80 180, 180 80, 280 80 C 350 80, 380 120, 380 150 L 380 180" fill="none" stroke="url(#emeraldGrad)" stroke-width="36" stroke-linecap="round" filter="url(#glow)" />
    <!-- Loop 1 Arrowhead -->
    <path d="M 350 160 L 380 190 L 410 160" fill="none" stroke="url(#emeraldGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Loop 2 (Indigo) -->
    <path d="M 336 136 C 336 236, 236 336, 136 336 C 66 336, 36 296, 36 266 L 36 236" fill="none" stroke="url(#indigoGrad)" stroke-width="36" stroke-linecap="round" filter="url(#glow)" />
    <!-- Loop 2 Arrowhead -->
    <path d="M 66 256 L 36 226 L 6 256" fill="none" stroke="url(#indigoGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Overlapping element circles in the center symbolizing the "Team" -->
    <!-- Center User Base -->
    <circle cx="208" cy="208" r="48" fill="#1e1b4b" stroke="white" stroke-width="8" filter="url(#glow)" />
    <circle cx="208" cy="192" r="18" fill="url(#indigoGrad)" />
    <path d="M 180 236 C 180 216, 236 216, 236 236" fill="url(#indigoGrad)" />

    <!-- Secondary User Node -->
    <circle cx="288" cy="248" r="32" fill="#0f172a" stroke="#34d399" stroke-width="5" />
    <circle cx="288" cy="238" r="12" fill="url(#emeraldGrad)" />
    <path d="M 270 266 C 270 252, 306 252, 306 266" fill="url(#emeraldGrad)" />

    <!-- Decorative Stars/Sparkles -->
    <path d="M 350 80 L 355 90 L 365 92 L 357 100 L 360 110 L 350 103 L 340 110 L 343 100 L 335 92 L 345 90 Z" fill="#fcd34d" />
  </g>
</svg>
